<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Mellieħa Hub</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Crimson+Pro:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --terracotta: #C4622D; --honey: #D4952A; --deep-blue: #1B3A5C;
  --sea-blue: #2E6B9E; --limestone: #EDE4D0; --dark-stone: #3D2B1F;
  --warm-white: #FBF7F0; --muted: #7A6B5A;
  --success: #2A6B3A; --success-bg: #EAF6EE;
  --danger: #993C1D; --danger-bg: #FAECE7;
}
body { font-family: 'Crimson Pro', Georgia, serif; background: var(--warm-white); color: var(--dark-stone); min-height: 100vh; }
.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
.login-card { background: #fff; border: 0.5px solid #DDD5C3; border-radius: 14px; padding: 2.5rem 2rem; width: 100%; max-width: 380px; text-align: center; }
.login-title { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--deep-blue); margin-bottom: 4px; }
.login-sub { font-size: 14px; color: var(--muted); margin-bottom: 1.5rem; }
.login-card input { width: 100%; padding: 10px 14px; border: 1px solid #DDD5C3; border-radius: 8px; font-family: 'Crimson Pro', serif; font-size: 16px; color: var(--dark-stone); background: var(--warm-white); outline: none; margin-bottom: 10px; }
.login-card input:focus { border-color: var(--sea-blue); background: #fff; }
.login-btn { width: 100%; padding: 12px; background: var(--deep-blue); color: #fff; border: none; border-radius: 8px; font-family: 'Playfair Display', serif; font-size: 17px; cursor: pointer; }
.login-btn:hover { background: #152E4A; }
.login-error { color: var(--danger); font-size: 13px; margin-top: 10px; display: none; }
.admin-wrap { display: none; }
.header { background: var(--deep-blue); padding: 1.25rem 1.5rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
.header-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.header-title { font-family: 'Playfair Display', serif; font-size: 20px; color: #fff; font-weight: 700; }
.header-badge { background: var(--terracotta); color: #fff; font-size: 12px; padding: 2px 10px; border-radius: 20px; }
.logout-btn { background: rgba(255,255,255,0.12); border: 0.5px solid rgba(255,255,255,0.25); color: rgba(255,255,255,0.8); padding: 6px 14px; border-radius: 20px; font-size: 13px; font-family: 'Crimson Pro', serif; cursor: pointer; }
.logout-btn:hover { background: rgba(255,255,255,0.2); }
.type-switcher { background: #fff; border-bottom: 1px solid #DDD5C3; padding: 0.75rem 1.5rem; display: flex; gap: 8px; flex-wrap: wrap; }
.type-btn { padding: 7px 18px; border: 1px solid #DDD5C3; border-radius: 20px; background: none; font-family: 'Crimson Pro', serif; font-size: 14px; color: var(--muted); cursor: pointer; transition: all 0.2s; }
.type-btn.active { background: var(--deep-blue); color: #fff; border-color: var(--deep-blue); }
.type-count { font-size: 11px; background: var(--limestone); color: var(--muted); padding: 1px 6px; border-radius: 10px; margin-left: 4px; }
.type-btn.active .type-count { background: rgba(255,255,255,0.25); color: #fff; }
.tabs { background: #fff; border-bottom: 1px solid #DDD5C3; padding: 0 1.5rem; display: flex; }
.tab-btn { padding: 12px 20px; border: none; border-bottom: 2px solid transparent; background: none; font-family: 'Crimson Pro', serif; font-size: 15px; color: var(--muted); cursor: pointer; transition: all 0.2s; }
.tab-btn.active { color: var(--deep-blue); border-bottom-color: var(--terracotta); font-weight: 600; }
.tab-count { background: var(--limestone); color: var(--muted); font-size: 11px; padding: 1px 7px; border-radius: 20px; margin-left: 6px; }
.tab-btn.active .tab-count { background: var(--terracotta); color: #fff; }
.content { max-width: 800px; margin: 0 auto; padding: 1.5rem; }
.loading { text-align: center; padding: 3rem; color: var(--muted); font-size: 16px; }
.empty { text-align: center; padding: 3rem; color: var(--muted); }
.items-list { display: flex; flex-direction: column; gap: 12px; }
.item-card { background: #fff; border: 0.5px solid #DDD5C3; border-radius: 12px; padding: 1.25rem; }
.item-card.approved { border-left: 4px solid var(--success); }
.item-card.rejected { border-left: 4px solid #ccc; opacity: 0.7; }
.item-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; margin-bottom: 10px; }
.item-name { font-family: 'Playfair Display', serif; font-size: 18px; line-height: 1.3; }
.status-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; flex-shrink: 0; }
.status-badge.approved { background: var(--success-bg); color: var(--success); }
.status-badge.rejected { background: #F5F5F5; color: #999; }
.item-meta { display: flex; gap: 1rem; flex-wrap: wrap; font-size: 13px; color: var(--muted); margin-bottom: 10px; }
.item-desc { font-size: 15px; line-height: 1.6; margin-bottom: 12px; padding: 10px 12px; background: var(--warm-white); border-radius: 8px; }
.item-footer { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
.submitted-by { font-size: 13px; color: var(--muted); }
.action-btns { display: flex; gap: 8px; }
.btn-approve { padding: 8px 18px; background: var(--success-bg); color: var(--success); border: 1px solid #B8DEC2; border-radius: 8px; font-family: 'Crimson Pro', serif; font-size: 15px; font-weight: 600; cursor: pointer; }
.btn-approve:hover { background: #D4EEDD; }
.btn-reject { padding: 8px 18px; background: var(--danger-bg); color: var(--danger); border: 1px solid #F5C4B3; border-radius: 8px; font-family: 'Crimson Pro', serif; font-size: 15px; font-weight: 600; cursor: pointer; }
.btn-reject:hover { background: #F5D9D0; }
.btn-delete { padding: 8px 14px; background: #F5F5F5; color: #999; border: 1px solid #ddd; border-radius: 8px; font-family: 'Crimson Pro', serif; font-size: 15px; cursor: pointer; }
.btn-delete:hover { background: #eee; color: #666; }
</style>
</head>
<body>

<div class="login-wrap" id="login-screen">
  <div class="login-card">
    <div class="login-title">Mellieħa Hub</div>
    <div class="login-sub">Admin access only</div>
    <input type="email" id="admin-email" placeholder="Your email" onkeydown="if(event.key==='Enter') login()">
    <input type="password" id="admin-password" placeholder="Your password" onkeydown="if(event.key==='Enter') login()">
    <button class="login-btn" id="login-btn" onclick="login()">Login →</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div class="admin-wrap" id="admin-panel">
  <div class="header">
    <div class="header-left">
      <div class="header-title">Mellieħa Hub Admin</div>
      <div class="header-badge" id="pending-badge">Loading...</div>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="type-switcher">
    <button class="type-btn active" onclick="switchType('events')" id="type-events">Events <span class="type-count" id="events-total">0</span></button>
    <button class="type-btn" onclick="switchType('news')" id="type-news">News <span class="type-count" id="news-total">0</span></button>
    <button class="type-btn" onclick="switchType('businesses')" id="type-businesses">Businesses <span class="type-count" id="businesses-total">0</span></button>
    <button class="type-btn" onclick="switchType('jobs')" id="type-jobs">Jobs <span class="type-count" id="jobs-total">0</span></button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('approved')" id="tab-approved">Approved <span class="tab-count" id="count-approved">0</span></button>
    <button class="tab-btn" onclick="switchTab('rejected')" id="tab-rejected">Rejected <span class="tab-count" id="count-rejected">0</span></button>
  </div>

  <div class="content">
    <div class="loading" id="loading">Loading...</div>
    <div class="items-list" id="items-list"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://xwistwtnmkixbbmsnfbf.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh3aXN0d3RubWtpeGJibXNuZmJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2OTExMjYsImV4cCI6MjA4OTI2NzEyNn0.QVk4wSI1eoF4Ya7uZzs6aZfKdMBx2g-DjqsY2RvyAHI';
  let sbClient = null;
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  let currentType = 'events', currentTab = 'approved';
  let data = { events: [], news: [], businesses: [], jobs: [] };
  let authToken = null;

  window.addEventListener('load', () => {
    try {
      sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch(e) {
      document.getElementById('login-error').textContent = 'Failed to load auth library. Please refresh.';
      document.getElementById('login-error').style.display = 'block';
    }
  });

  async function login() {
    const email = document.getElementById('admin-email').value.trim();
    const password = document.getElementById('admin-password').value;
    const errorEl = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');
    errorEl.style.display = 'none';

    if (!sbClient) {
      errorEl.textContent = 'Auth not ready — please refresh the page.';
      errorEl.style.display = 'block';
      return;
    }

    btn.textContent = 'Logging in...';
    btn.disabled = true;

    const { data: authData, error } = await sbClient.auth.signInWithPassword({ email, password });

    if (error) {
      errorEl.textContent = 'Incorrect email or password. Try again.';
      errorEl.style.display = 'block';
      btn.textContent = 'Login →';
      btn.disabled = false;
      return;
    }

    authToken = authData.session.access_token;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    loadAll();
  }

  async function logout() {
    if (sbClient) await sbClient.auth.signOut();
    authToken = null;
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('admin-email').value = '';
    document.getElementById('admin-password').value = '';
  }

  function getHeaders(extra) {
    const token = authToken || SUPABASE_ANON_KEY;
    return { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${token}`, ...extra };
  }

  function switchType(type) {
    currentType = type; currentTab = 'approved';
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('type-' + type).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-approved').classList.add('active');
    updateCounts(); renderItems();
  }

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    renderItems();
  }

  async function loadAll() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('items-list').innerHTML = '';
    try {
      const H = getHeaders();
      const [evR, nR, bR, jR] = await Promise.all([
        fetch(`${SUPABASE_URL}/rest/v1/events?order=created_at.desc`, { headers: H }),
        fetch(`${SUPABASE_URL}/rest/v1/news?order=created_at.desc`, { headers: H }),
        fetch(`${SUPABASE_URL}/rest/v1/businesses?order=created_at.desc`, { headers: H }),
        fetch(`${SUPABASE_URL}/rest/v1/jobs?order=created_at.desc`, { headers: H })
      ]);
      data.events = await evR.json();
      data.news = await nR.json();
      data.businesses = await bR.json();
      data.jobs = await jR.json();
      updateCounts(); renderItems();
    } catch(e) { document.getElementById('loading').textContent = 'Failed to load. Check your connection.'; }
  }

  function updateCounts() {
    const d = data[currentType];
    document.getElementById('count-approved').textContent = d.filter(i => i.status === 'approved').length;
    document.getElementById('count-rejected').textContent = d.filter(i => i.status === 'rejected').length;
    document.getElementById('events-total').textContent = data.events.length;
    document.getElementById('news-total').textContent = data.news.length;
    document.getElementById('businesses-total').textContent = data.businesses.length;
    document.getElementById('jobs-total').textContent = data.jobs.length;
    const total = data.events.length + data.news.length + data.businesses.length + data.jobs.length;
    document.getElementById('pending-badge').textContent = total + ' total entries';
  }

  function formatDate(str) {
    if (!str) return ''; const d = new Date(str);
    return d.getDate() + ' ' + MONTHS[d.getMonth()] + ' ' + d.getFullYear();
  }

  function renderItems() {
    document.getElementById('loading').style.display = 'none';
    const list = document.getElementById('items-list');
    const filtered = data[currentType].filter(i => i.status === currentTab);
    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty"><div style="font-size:36px;margin-bottom:8px;">${currentTab==='approved'?'✅':'🗑️'}</div><div style="color:var(--muted);font-size:16px;">No ${currentTab} ${currentType}</div></div>`;
      return;
    }
    list.innerHTML = filtered.map(item => {
      const title = item.name || item.headline || item.title;
      const desc = item.description || item.excerpt || '';
      let meta = '';
      if (currentType === 'events') meta = `<span>📅 ${formatDate(item.date)}</span><span>📍 ${item.location||''}</span><span>🏷️ ${item.category||''}</span>`;
      else if (currentType === 'news') meta = `<span>🗂️ ${item.category||''}</span><span>🕐 ${formatDate(item.created_at)}</span>`;
      else if (currentType === 'businesses') meta = `<span>🏷️ ${item.category||''}</span><span>📍 ${item.address||''}</span>`;
      else if (currentType === 'jobs') meta = `<span>🏢 ${item.business_name||''}</span><span>🕐 ${formatDate(item.created_at)}</span>`;
      return `
        <div class="item-card ${item.status}">
          <div class="item-top"><div class="item-name">${title}</div><div class="status-badge ${item.status}">${item.status}</div></div>
          <div class="item-meta">${meta}</div>
          ${desc ? `<div class="item-desc">${desc}</div>` : ''}
          <div class="item-footer">
            <div class="submitted-by">By: <strong>${item.submitted_by||''}</strong></div>
            <div class="action-btns">
              ${item.status !== 'approved' ? `<button class="btn-approve" onclick="updateStatus('${item.id}', 'approved')">✓ Approve</button>` : ''}
              ${item.status !== 'rejected' ? `<button class="btn-reject" onclick="updateStatus('${item.id}', 'rejected')">✗ Reject</button>` : ''}
              <button class="btn-delete" onclick="deleteItem('${item.id}')">Delete</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  async function updateStatus(id, status) {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${currentType}?id=eq.${id}`, {
        method: 'PATCH',
        headers: getHeaders({ 'Content-Type': 'application/json', 'Prefer': 'return=representation' }),
        body: JSON.stringify({ status })
      });
      if (res.ok) { data[currentType] = data[currentType].map(i => i.id == id ? {...i, status} : i); updateCounts(); renderItems(); }
      else { const err = await res.json(); alert('Error: ' + JSON.stringify(err)); }
    } catch(e) { alert('Failed: ' + e.message); }
  }

  async function deleteItem(id) {
    if (!confirm('Delete this item?')) return;
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${currentType}?id=eq.${id}`, {
        method: 'DELETE',
        headers: getHeaders({ 'Prefer': 'return=representation' })
      });
      if (res.ok) { data[currentType] = data[currentType].filter(i => i.id != id); updateCounts(); renderItems(); }
      else { const err = await res.json(); alert('Error: ' + JSON.stringify(err)); }
    } catch(e) { alert('Failed: ' + e.message); }
  }
</script>
</body>
</html>
